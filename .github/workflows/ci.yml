name: CI

on:
  push:
    branches: [main]
  pull_request:

jobs:
  backend:
    name: Backend build & tests
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Setup .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: 9.0.x
      - name: Run unit tests
        run: dotnet test Backend/TaskManagement.sln --nologo

  frontend:
    name: Frontend build
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: Frontend/task-manager
    steps:
      - uses: actions/checkout@v4
      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
          cache-dependency-path: Frontend/task-manager/package-lock.json
      - name: Install dependencies
        run: npm ci
      - name: Type-check and build
        run: npm run build
